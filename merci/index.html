rmat('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* PÉRIMÉNOPAUSE AUTREMENT — COLOR TOKENS\n   Rebrand of the naturopathy practice into a single dedicated program:\n   a 12-month immersive community guiding women through perimenopause with\n   sovereignty, warmth and quiet power (\"féminin sacré\", \"souveraineté\").\n     • Rosé-beige  #E1CEC3   client-specified brand color — soft accent\n     • Ivory       warm cream ground (replaces the old pale lemon)\n     • Wine        deep, warm espresso-wine — primary/ink, replaces navy\n   Earthy, grounded and mature. Wine carries the power moments; rosé is the\n   soft, sacred-feminine accent that wraps around it.\n   ------------------------------------------------------------------ */\n:root {\n  /* ---- Neutrals (warm ivory ground → deep wine-espresso ink) ---- */\n  --cream-50:  #FFFFFF;  /* white — purest ground */\n  --cream-100: #FBF3EE;  /* warm ivory — default page ground */\n  --cream-200: #F4E6DE;  /* sunken surfaces */\n  --sand-300:  #E6D2C7;  /* borders / dividers on light */\n  --taupe-400: #C7A797;  /* muted decorative, disabled fill */\n  --stone-500: #8C7166;  /* muted/secondary text (warm brown-grey) */\n  --ink-600:   #6B4A3E;  /* tertiary text */\n  --ink-700:   #4A2E25;  /* body text (warm espresso) */\n  --ink-800:   #33201A;  /* headings — BRAND DEEP INK */\n  --ink-900:   #221310;  /* strongest ink */\n\n  /* ---- Rose (soft brand accent — the client's rosé-beige) ---- */\n  --rose-50:  #FCF5F1;\n  --rose-100: #F5E5DC;\n  --rose-200: #E1CEC3;  /* BRAND rosé-beige (accent panels) */\n  --rose-300: #D2B4A4;\n  --rose-400: #C0967F;\n  --rose-500: #A97A61;  /* mid rose — links, secondary CTA */\n  --rose-600: #8D6250;\n  --rose-700: #6E4B3E;\n  --rose-800: #52362C;\n  --rose-900: #38241D;\n\n  /* ---- Wine (deep accent — power, sovereignty, primary CTA) ---- */\n  --wine-50:  #F6EBE7;\n  --wine-100: #E8CCC4;\n  --wine-200: #D2A093;\n  --wine-300: #B87363;\n  --wine-400: #98493A;\n  --wine-500: #7A3527;  /* PRIMARY — deep wine */\n  --wine-600: #632A1F;\n  --wine-700: #4C2018;\n  --wine-800: #341612;\n  --wine-900: #220E0B;\n\n  /* ---- Semantic hues (muted, natural) ---- */\n  --green-success: #6B7D4A;\n  --green-success-soft: #E8EBDA;\n  --red-error:     #B14A3B;\n  --red-error-soft:#F3DEDA;\n  --amber-warning: #AD8A3E;\n  --amber-warning-soft: #F1E8D2;\n  --slate-info:    #5C4A50;\n  --slate-info-soft: #EBE2E4;\n\n  --white: #FFFFFF;\n  --pure-black: #180C09;\n\n  /* ================= SEMANTIC ALIASES ================= */\n\n  /* Surfaces */\n  --surface-page:    var(--cream-100);  /* warm ivory ground */\n  --surface-raised:  var(--cream-50);   /* white */\n  --surface-card:    var(--white);\n  --surface-sunken:  var(--cream-200);\n  --surface-inverse: var(--ink-800);    /* deep wine-espresso */\n  --surface-rose:    var(--rose-200);   /* rosé-beige panel */\n  --surface-wine:    var(--wine-50);\n\n  /* Text */\n  --text-strong:    var(--ink-900);\n  --text-heading:   var(--ink-800);\n  --text-body:      var(--ink-700);\n  --text-muted:     var(--stone-500);\n  --text-tertiary:  var(--ink-600);\n  --text-inverse:   var(--cream-50);\n  --text-on-primary:   var(--cream-50);  /* light text on the wine primary button */\n  --text-on-secondary: var(--cream-50);  /* light text on the rose secondary button */\n  --text-link:      var(--rose-600);\n\n  /* Borders & dividers */\n  --border-subtle:  var(--sand-300);\n  --border-default: var(--taupe-400);\n  --border-strong:  var(--ink-700);\n  --divider:        var(--cream-200);\n\n  /* Brand */\n  --brand-primary:        var(--wine-500);  /* deep wine — primary CTA */\n  --brand-primary-hover:  var(--wine-600);\n  --brand-primary-press:  var(--wine-700);\n  --brand-secondary:      var(--rose-500);  /* mid rose — secondary CTA */\n  --brand-secondary-hover:var(--rose-600);\n\n  /* Focus ring */\n  --focus-ring: var(--rose-400);\n}\n<\u002Fstyle>\n  <style>/* PÉRIMÉNOPAUSE AUTREMENT — TYPOGRAPHY TOKENS\n   Display & headings: Bodoni Moda (ceremonial high-contrast serif, real italics).\n   UI, body, labels: Work Sans (quiet humanist grotesque).\n   ------------------------------------------------------------------ */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Bodoni Moda', 'Didot', 'Hoefler Text', Georgia, serif;\n  --font-serif:   'Bodoni Moda', 'Didot', 'Hoefler Text', Georgia, serif;\n  --font-sans:    'Work Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif;\n  --font-body:    var(--font-sans);\n\n  /* ---- Weights ---- */\n  --fw-light:   300; /* @kind font */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold:600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n\n  /* ---- Display / heading scale (serif) ---- */\n  --text-display:  clamp(3.5rem, 6vw, 5.5rem);  /* hero wordmark moments */\n  --text-h1:       clamp(2.75rem, 4.5vw, 4rem);\n  --text-h2:       clamp(2.125rem, 3vw, 2.75rem);\n  --text-h3:       1.75rem;\n  --text-h4:       1.375rem;\n\n  /* ---- Body / UI scale (sans) ---- */\n  --text-lead:     1.25rem;   /* 20px — intro paragraphs */\n  --text-base:     1rem;      /* 16px */\n  --text-sm:       0.875rem;  /* 14px */\n  --text-xs:       0.75rem;   /* 12px — eyebrows, captions */\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.7;\n\n  /* ---- Letter-spacing ---- */\n  --tracking-tight:  -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow:0.22em;  /* uppercase eyebrows / labels */\n\n  /* ---- Semantic roles ---- */\n  --eyebrow-size:    var(--text-xs);\n  --eyebrow-spacing: var(--tracking-eyebrow);\n}\n<\u002Fstyle>\n  <style>/* PÉRIMÉNOPAUSE AUTREMENT — SPACING, RADII, SHADOWS, LAYOUT\n   4px base rhythm. Minimal, refined rounding. Soft, wine-tinted shadows.\n   ------------------------------------------------------------------ */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0:  0;\n  --space-1:  0.25rem;  /* 4 */\n  --space-2:  0.5rem;   /* 8 */\n  --space-3:  0.75rem;  /* 12 */\n  --space-4:  1rem;     /* 16 */\n  --space-5:  1.5rem;   /* 24 */\n  --space-6:  2rem;     /* 32 */\n  --space-7:  3rem;     /* 48 */\n  --space-8:  4rem;     /* 64 */\n  --space-9:  6rem;     /* 96 */\n  --space-10: 8rem;     /* 128 */\n\n  /* ---- Corner radii (restrained) ---- */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;\n  --radius-lg:   10px;\n  --radius-xl:   16px;\n  --radius-pill: 999px;\n\n  /* ---- Borders ---- */\n  --border-hairline: 1px;\n  --border-regular:  1.5px;\n\n  /* ---- Shadows (warm, low elevation) ---- */\n  --shadow-xs: 0 1px 2px rgba(51, 32, 26, 0.06);\n  --shadow-sm: 0 2px 6px rgba(51, 32, 26, 0.07);\n  --shadow-md: 0 6px 18px rgba(51, 32, 26, 0.09);\n  --shadow-lg: 0 14px 40px rgba(51, 32, 26, 0.12);\n  --shadow-focus: 0 0 0 3px rgba(192, 150, 127, 0.45); /* rose-400 @ 45% */\n\n  /* ---- Layout ---- */\n  --container-sm:  640px;\n  --container-md:  860px;\n  --container-lg:  1140px;\n  --container-xl:  1320px;\n  --gutter:        clamp(1.25rem, 4vw, 4rem); /* @kind spacing */\n\n  /* ---- Motion ---- */\n  --ease-soft:    cubic-bezier(0.33, 0.0, 0.2, 1); /* @kind other */\n  --ease-out:     cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --dur-fast:     140ms; /* @kind other */\n  --dur-base:     240ms; /* @kind other */\n  --dur-slow:     440ms; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* PÉRIMÉNOPAUSE AUTREMENT — BASE ELEMENT DEFAULTS\n   Lightweight, opt-in element styling built on the tokens. Sets the\n   page in warm ivory with Work Sans body and Bodoni Moda headings.\n   ------------------------------------------------------------------ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-body);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  font-weight: var(--fw-regular);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  color: var(--text-heading);\n  font-weight: var(--fw-medium);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  margin: 0 0 var(--space-4);\n}\nh1 { font-size: var(--text-h1); }\nh2 { font-size: var(--text-h2); }\nh3 { font-size: var(--text-h3); }\nh4 { font-size: var(--text-h4); font-weight: var(--fw-semibold); }\n\np { margin: 0 0 var(--space-4); text-wrap: pretty; }\n\na { color: var(--text-link); text-decoration: none; transition: color var(--dur-fast) var(--ease-soft); }\na:hover { color: var(--rose-800); }\n\n/* Eyebrow / overline utility */\n.en-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--eyebrow-size);\n  font-weight: var(--fw-medium);\n  letter-spacing: var(--eyebrow-spacing);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n/* Editorial lead paragraph */\n.en-lead {\n  font-family: var(--font-display);\n  font-size: var(--text-lead);\n  line-height: var(--leading-relaxed);\n  color: var(--text-body);\n}\n\n::selection { background: var(--rose-200); color: var(--ink-900); }\n\n:focus-visible { outline: none; box-shadow: var(--shadow-focus); border-radius: var(--radius-sm); }\n<\u002Fstyle>\n  <style>/* PÉRIMÉNOPAUSE AUTREMENT — COMPONENT STYLES\n   Class-based styling for the React primitives. Shipped to consumers via\n   styles.css so components render correctly anywhere the stylesheet loads.\n   All visual values reference tokens. Prefix: .en-\n   Roles: wine = primary/interactive accent (buttons, focus, checked\n   states). rose = soft/secondary accent (badges, tags, avatars, subtle panels).\n   ------------------------------------------------------------------ */\n\n/* ============================== BUTTON ============================== */\n.en-btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);\n  font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--fw-medium);\n  letter-spacing: 0.06em; text-transform: uppercase;\n  padding: 0 var(--space-5); height: 46px;\n  background: var(--brand-primary); color: var(--text-on-primary);\n  border: var(--border-hairline) solid transparent;\n  border-radius: var(--radius-sm); cursor: pointer;\n  transition: background var(--dur-base) var(--ease-soft), color var(--dur-base) var(--ease-soft),\n              border-color var(--dur-base) var(--ease-soft), transform var(--dur-fast) var(--ease-soft);\n  text-decoration: none; white-space: nowrap; user-select: none;\n}\n.en-btn:hover { background: var(--brand-primary-hover); }\n.en-btn:active { transform: translateY(1px); }\n.en-btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); }\n\n.en-btn--secondary { background: var(--brand-secondary); color: var(--text-on-secondary); }\n.en-btn--secondary:hover { background: var(--brand-secondary-hover); }\n\n.en-btn--outline { background: transparent; color: var(--ink-800); border-color: var(--border-default); }\n.en-btn--outline:hover { background: var(--cream-100); border-color: var(--ink-700); }\n\n.en-btn--ghost { background: transparent; color: var(--ink-800); border-color: transparent; }\n.en-btn--ghost:hover { background: var(--cream-200); }\n\n.en-btn--link {\n  background: transparent; color: var(--text-link); border-color: transparent;\n  height: auto; padding: 0; text-transform: none; letter-spacing: 0; font-size: var(--text-sm);\n  border-bottom: 1px solid var(--sand-300); border-radius: 0;\n}\n.en-btn--link:hover { color: var(--rose-800); border-bottom-color: var(--rose-600); }\n.en-btn--link:active { transform: none; }\n\n.en-btn--sm { height: 38px; font-size: var(--text-xs); padding: 0 var(--space-4); }\n.en-btn--lg { height: 54px; font-size: var(--text-sm); padding: 0 var(--space-6); }\n.en-btn--block { display: flex; width: 100%; }\n\n.en-btn:disabled, .en-btn[aria-disabled=\"true\"] {\n  opacity: 0.45; cursor: not-allowed; pointer-events: none;\n}\n.en-btn__icon { display: inline-flex; width: 18px; height: 18px; }\n.en-btn__icon svg { width: 100%; height: 100%; }\n\n/* ============================ ICON BUTTON =========================== */\n.en-icon-btn {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 42px; height: 42px; border-radius: var(--radius-sm);\n  background: transparent; color: var(--ink-700);\n  border: var(--border-hairline) solid transparent; cursor: pointer;\n  transition: background var(--dur-base) var(--ease-soft), color var(--dur-base) var(--ease-soft);\n}\n.en-icon-btn:hover { background: var(--cream-200); color: var(--ink-900); }\n.en-icon-btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); }\n.en-icon-btn--outline { border-color: var(--border-default); }\n.en-icon-btn--sm { width: 34px; height: 34px; }\n.en-icon-btn svg { width: 20px; height: 20px; }\n\n/* ============================== BADGE =============================== */\n.en-badge {\n  display: inline-flex; align-items: center; gap: var(--space-1);\n  font-family: var(--font-sans); font-size: 11px; font-weight: var(--fw-medium);\n  letter-spacing: 0.1em; text-transform: uppercase;\n  padding: 3px var(--space-2); border-radius: var(--radius-xs);\n  background: var(--rose-100); color: var(--rose-800);\n}\n.en-badge--wine   { background: var(--wine-100); color: var(--wine-700); }\n.en-badge--neutral{ background: var(--cream-200); color: var(--ink-700); }\n.en-badge--success{ background: var(--green-success-soft); color: var(--green-success); }\n.en-badge--error  { background: var(--red-error-soft); color: var(--red-error); }\n.en-badge--solid  { background: var(--wine-500); color: var(--cream-50); }\n\n/* =============================== TAG =============================== */\n.en-tag {\n  display: inline-flex; align-items: center; gap: var(--space-2);\n  font-family: var(--font-sans); font-size: var(--text-sm); color: var(--ink-700);\n  padding: var(--space-1) var(--space-3); border-radius: var(--radius-pill);\n  border: var(--border-hairline) solid var(--border-subtle); background: var(--cream-50);\n  transition: border-color var(--dur-base) var(--ease-soft), background var(--dur-base) var(--ease-soft);\n}\n.en-tag[data-selected=\"true\"] { background: var(--rose-100); border-color: var(--rose-400); color: var(--rose-800); }\n.en-tag--button { cursor: pointer; }\n.en-tag--button:hover { border-color: var(--taupe-400); }\n.en-tag__close { display: inline-flex; cursor: pointer; opacity: .55; }\n.en-tag__close:hover { opacity: 1; }\n\n/* ============================== AVATAR ============================== */\n.en-avatar {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 44px; height: 44px; border-radius: var(--radius-pill); overflow: hidden;\n  background: var(--rose-200); color: var(--rose-800);\n  font-family: var(--font-display); font-size: 18px; font-weight: var(--fw-semibold);\n  flex: none;\n}\n.en-avatar img { width: 100%; height: 100%; object-fit: cover; }\n.en-avatar--sm { width: 32px; height: 32px; font-size: 14px; }\n.en-avatar--lg { width: 64px; height: 64px; font-size: 26px; }\n.en-avatar--square { border-radius: var(--radius-md); }\n\n/* =============================== CARD =============================== */\n.en-card {\n  background: var(--surface-card); border: var(--border-hairline) solid var(--border-subtle);\n  border-radius: var(--radius-lg); overflow: hidden;\n  transition: box-shadow var(--dur-base) var(--ease-soft), transform var(--dur-base) var(--ease-soft),\n              border-color var(--dur-base) var(--ease-soft);\n}\n.en-card--raised { box-shadow: var(--shadow-sm); border-color: transparent; }\n.en-card--interactive { cursor: pointer; }\n.en-card--interactive:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: transparent; }\n.en-card__media { width: 100%; aspect-ratio: 4 / 5; background: var(--cream-200); overflow: hidden; }\n.en-card__media img { width: 100%; height: 100%; object-fit: cover; }\n.en-card__body { padding: var(--space-5); }\n\n/* ============================= DIVIDER ============================= */\n.en-divider { border: none; border-top: var(--border-hairline) solid var(--divider); margin: var(--space-5) 0; }\n.en-divider--label {\n  display: flex; align-items: center; gap: var(--space-3); border: none; margin: var(--space-5) 0;\n  font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted);\n}\n.en-divider--label::before, .en-divider--label::after { content: \"\"; flex: 1; height: 1px; background: var(--divider); }\n\n/* ============================ FORM FIELD ============================ */\n.en-field { display: flex; flex-direction: column; gap: var(--space-2); font-family: var(--font-sans); }\n.en-label { font-size: var(--text-sm); font-weight: var(--fw-medium); color: var(--text-heading); letter-spacing: 0.01em; }\n.en-label__req { color: var(--wine-500); margin-left: 2px; }\n.en-help { font-size: var(--text-xs); color: var(--text-muted); }\n.en-help--error { color: var(--red-error); }\n\n.en-input, .en-textarea, .en-select__control {\n  font-family: var(--font-sans); font-size: var(--text-base); color: var(--ink-800);\n  background: var(--surface-card); border: var(--border-hairline) solid var(--border-default);\n  border-radius: var(--radius-sm); padding: 0 var(--space-4); height: 46px; width: 100%;\n  transition: border-color var(--dur-base) var(--ease-soft), box-shadow var(--dur-base) var(--ease-soft);\n}\n.en-input::placeholder, .en-textarea::placeholder { color: var(--taupe-400); }\n.en-input:hover, .en-textarea:hover, .en-select__control:hover { border-color: var(--ink-600); }\n.en-input:focus, .en-textarea:focus, .en-select__control:focus {\n  outline: none; border-color: var(--wine-500); box-shadow: var(--shadow-focus);\n}\n.en-textarea { height: auto; min-height: 110px; padding: var(--space-3) var(--space-4); line-height: var(--leading-normal); resize: vertical; }\n.en-input[aria-invalid=\"true\"], .en-textarea[aria-invalid=\"true\"] { border-color: var(--red-error); }\n.en-input:disabled, .en-textarea:disabled { background: var(--cream-200); color: var(--text-muted); cursor: not-allowed; }\n\n.en-select { position: relative; }\n.en-select__control { appearance: none; padding-right: var(--space-7); cursor: pointer; }\n.en-select__chevron { position: absolute; right: var(--space-4); top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--ink-600); }\n\n/* =========================== CHECKBOX ============================= */\n.en-check { display: inline-flex; align-items: flex-start; gap: var(--space-3); cursor: pointer; font-family: var(--font-sans); font-size: var(--text-base); color: var(--text-body); }\n.en-check input { position: absolute; opacity: 0; width: 0; height: 0; }\n.en-check__box {\n  flex: none; width: 20px; height: 20px; border-radius: var(--radius-xs);\n  border: var(--border-regular) solid var(--border-default); background: var(--surface-card);\n  display: inline-flex; align-items: center; justify-content: center; margin-top: 1px;\n  transition: background var(--dur-fast) var(--ease-soft), border-color var(--dur-fast) var(--ease-soft);\n  color: var(--cream-50);\n}\n.en-check__box svg { width: 13px; height: 13px; opacity: 0; transform: scale(.6); transition: opacity var(--dur-fast), transform var(--dur-fast); }\n.en-check input:checked + .en-check__box { background: var(--wine-500); border-color: var(--wine-500); }\n.en-check input:checked + .en-check__box svg { opacity: 1; transform: scale(1); }\n.en-check input:focus-visible + .en-check__box { box-shadow: var(--shadow-focus); }\n.en-check--radio .en-check__box { border-radius: var(--radius-pill); }\n.en-check--radio .en-check__dot { width: 10px; height: 10px; border-radius: 50%; background: var(--cream-50); opacity: 0; transform: scale(.4); transition: opacity var(--dur-fast), transform var(--dur-fast); }\n.en-check--radio input:checked + .en-check__box .en-check__dot { opacity: 1; transform: scale(1); }\n\n/* ============================= SWITCH ============================= */\n.en-switch { display: inline-flex; align-items: center; gap: var(--space-3); cursor: pointer; font-family: var(--font-sans); font-size: var(--text-base); color: var(--text-body); }\n.en-switch input { position: absolute; opacity: 0; width: 0; height: 0; }\n.en-switch__track {\n  width: 46px; height: 26px; border-radius: var(--radius-pill); background: var(--taupe-400);\n  position: relative; transition: background var(--dur-base) var(--ease-soft); flex: none;\n}\n.en-switch__thumb {\n  position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%;\n  background: var(--cream-50); box-shadow: var(--shadow-sm); transition: transform var(--dur-base) var(--ease-out);\n}\n.en-switch input:checked + .en-switch__track { background: var(--wine-500); }\n.en-switch input:checked + .en-switch__track .en-switch__thumb { transform: translateX(20px); }\n.en-switch input:focus-visible + .en-switch__track { box-shadow: var(--shadow-focus); }\n\n/* ============================== ALERT ============================= */\n.en-alert {\n  display: flex; gap: var(--space-3); align-items: flex-start;\n  padding: var(--space-4) var(--space-5); border-radius: var(--radius-md);\n  font-family: var(--font-sans); font-size: var(--text-sm); line-height: var(--leading-normal);\n  border: var(--border-hairline) solid; background: var(--rose-50); border-color: var(--rose-200); color: var(--rose-900);\n}\n.en-alert__icon { flex: none; margin-top: 1px; color: var(--rose-600); }\ th\n   sovereignty, warmth and quiet power (\"féminin sacré\", \"souveraineté\").\n     • Rosé-beige  #E1CEC3   client-specified brand color — soft accent\n     • Ivory       warm cream ground (replaces the old pale lemon)\n     • Wine        deep, warm espresso-wine — primary/ink, replaces navy\n   Earthy, grounded and mature. Wine carries the power moments; rosé is the\n   soft, sacred-feminine accent that wraps around it.\n   ------------------------------------------------------------------ */\n:root {\n  /* ---- Neutrals (warm ivory ground → deep wine-espresso ink) ---- */\n  --cream-50:  #FFFFFF;  /* white — purest ground */\n  --cream-100: #FBF3EE;  /* warm ivory — default page ground */\n  --cream-200: #F4E6DE;  /* sunken surfaces */\n  --sand-300:  #E6D2C7;  /* borders / dividers on light */\n  --taupe-400: #C7A797;  /* muted decorative, disabled fill */\n  --stone-500: #8C7166;  /* muted/secondary text (warm brown-grey) */\n  --ink-600:   #6B4A3E;  /* tertiary text */\n  --ink-700:   #4A2E25;  /* body text (warm espresso) */\n  --ink-800:   #33201A;  /* headings — BRAND DEEP INK */\n  --ink-900:   #221310;  /* strongest ink */\n\n  /* ---- Rose (soft brand accent — the client's rosé-beige) ---- */\n  --rose-50:  #FCF5F1;\n  --rose-100: #F5E5DC;\n  --rose-200: #E1CEC3;  /* BRAND rosé-beige (accent panels) */\n  --rose-300: #D2B4A4;\n  --rose-400: #C0967F;\n  --rose-500: #A97A61;  /* mid rose — links, secondary CTA */\n  --rose-600: #8D6250;\n  --rose-700: #6E4B3E;\n  --rose-800: #52362C;\n  --rose-900: #38241D;\n\n  /* ---- Wine (deep accent — power, sovereignty, primary CTA) ---- */\n  --wine-50:  #F6EBE7;\n  --wine-100: #E8CCC4;\n  --wine-200: #D2A093;\n  --wine-300: #B87363;\n  --wine-400: #98493A;\n  --wine-500: #7A3527;  /* PRIMARY — deep wine */\n  --wine-600: #632A1F;\n  --wine-700: #4C2018;\n  --wine-800: #341612;\n  --wine-900: #220E0B;\n\n  /* ---- Semantic hues (muted, natural) ---- */\n  --green-success: #6B7D4A;\n  --green-success-soft: #E8EBDA;\n  --red-error:     #B14A3B;\n  --red-error-soft:#F3DEDA;\n  --amber-warning: #AD8A3E;\n  --amber-warning-soft: #F1E8D2;\n  --slate-info:    #5C4A50;\n  --slate-info-soft: #EBE2E4;\n\n  --white: #FFFFFF;\n  --pure-black: #180C09;\n\n  /* ================= SEMANTIC ALIASES ================= */\n\n  /* Surfaces */\n  --surface-page:    var(--cream-100);  /* warm ivory ground */\n  --surface-raised:  var(--cream-50);   /* white */\n  --surface-card:    var(--white);\n  --surface-sunken:  var(--cream-200);\n  --surface-inverse: var(--ink-800);    /* deep wine-espresso */\n  --surface-rose:    var(--rose-200);   /* rosé-beige panel */\n  --surface-wine:    var(--wine-50);\n\n  /* Text */\n  --text-strong:    var(--ink-900);\n  --text-heading:   var(--ink-800);\n  --text-body:      var(--ink-700);\n  --text-muted:     var(--stone-500);\n  --text-tertiary:  var(--ink-600);\n  --text-inverse:   var(--cream-50);\n  --text-on-primary:   var(--cream-50);  /* light text on the wine primary button */\n  --text-on-secondary: var(--cream-50);  /* light text on the rose secondary button */\n  --text-link:      var(--rose-600);\n\n  /* Borders & dividers */\n  --border-subtle:  var(--sand-300);\n  --border-default: var(--taupe-400);\n  --border-strong:  var(--ink-700);\n  --divider:        var(--cream-200);\n\n  /* Brand */\n  --brand-primary:        var(--wine-500);  /* deep wine — primary CTA */\n  --brand-primary-hover:  var(--wine-600);\n  --brand-primary-press:  var(--wine-700);\n  --brand-secondary:      var(--rose-500);  /* mid rose — secondary CTA */\n  --brand-secondary-hover:var(--rose-600);\n\n  /* Focus ring */\n  --focus-ring: var(--rose-400);\n}\n\n/* PÉRIMÉNOPAUSE AUTREMENT — TYPOGRAPHY TOKENS\n   Display & headings: Bodoni Moda (ceremonial high-contrast serif, real italics).\n   UI, body, labels: Work Sans (quiet humanist grotesque).\n   ------------------------------------------------------------------ */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Bodoni Moda', 'Didot', 'Hoefler Text', Georgia, serif;\n  --font-serif:   'Bodoni Moda', 'Didot', 'Hoefler Text', Georgia, serif;\n  --font-sans:    'Work Sans', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif;\n  --font-body:    var(--font-sans);\n\n  /* ---- Weights ---- */\n  --fw-light:   300; /* @kind font */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold:600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n\n  /* ---- Display / heading scale (serif) ---- */\n  --text-display:  clamp(3.5rem, 6vw, 5.5rem);  /* hero wordmark moments */\n  --text-h1:       clamp(2.75rem, 4.5vw, 4rem);\n  --text-h2:       clamp(2.125rem, 3vw, 2.75rem);\n  --text-h3:       1.75rem;\n  --text-h4:       1.375rem;\n\n  /* ---- Body / UI scale (sans) ---- */\n  --text-lead:     1.25rem;   /* 20px — intro paragraphs */\n  --text-base:     1rem;      /* 16px */\n  --text-sm:       0.875rem;  /* 14px */\n  --text-xs:       0.75rem;   /* 12px — eyebrows, captions */\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.7;\n\n  /* ---- Letter-spacing ---- */\n  --tracking-tight:  -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow:0.22em;  /* uppercase eyebrows / labels */\n\n  /* ---- Semantic roles ---- */\n  --eyebrow-size:    var(--text-xs);\n  --eyebrow-spacing: var(--tracking-eyebrow);\n}\n\n/* PÉRIMÉNOPAUSE AUTREMENT — SPACING, RADII, SHADOWS, LAYOUT\n   4px base rhythm. Minimal, refined rounding. Soft, wine-tinted shadows.\n   ------------------------------------------------------------------ */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0:  0;\n  --space-1:  0.25rem;  /* 4 */\n  --space-2:  0.5rem;   /* 8 */\n  --space-3:  0.75rem;  /* 12 */\n  --space-4:  1rem;     /* 16 */\n  --space-5:  1.5rem;   /* 24 */\n  --space-6:  2rem;     /* 32 */\n  --space-7:  3rem;     /* 48 */\n  --space-8:  4rem;     /* 64 */\n  --space-9:  6rem;     /* 96 */\n  --space-10: 8rem;     /* 128 */\n\n  /* ---- Corner radii (restrained) ---- */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;\n  --radius-lg:   10px;\n  --radius-xl:   16px;\n  --radius-pill: 999px;\n\n  /* ---- Borders ---- */\n  --border-hairline: 1px;\n  --border-regular:  1.5px;\n\n  /* ---- Shadows (warm, low elevation) ---- */\n  --shadow-xs: 0 1px 2px rgba(51, 32, 26, 0.06);\n  --shadow-sm: 0 2px 6px rgba(51, 32, 26, 0.07);\n  --shadow-md: 0 6px 18px rgba(51, 32, 26, 0.09);\n  --shadow-lg: 0 14px 40px rgba(51, 32, 26, 0.12);\n  --shadow-focus: 0 0 0 3px rgba(192, 150, 127, 0.45); /* rose-400 @ 45% */\n\n  /* ---- Layout ---- */\n  --container-sm:  640px;\n  --container-md:  860px;\n  --container-lg:  1140px;\n  --container-xl:  1320px;\n  --gutter:        clamp(1.25rem, 4vw, 4rem); /* @kind spacing */\n\n  /* ---- Motion ---- */\n  --ease-soft:    cubic-bezier(0.33, 0.0, 0.2, 1); /* @kind other */\n  --ease-out:     cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --dur-fast:     140ms; /* @kind other */\n  --dur-base:     240ms; /* @kind other */\n  --dur-slow:     440ms; /* @kind other */\n}\n\n/* PÉRIMÉNOPAUSE AUTREMENT — BASE ELEMENT DEFAULTS\n   Lightweight, opt-in element styling built on the tokens. Sets the\n   page in warm ivory with Work Sans body and Bodoni Moda headings.\n   ------------------------------------------------------------------ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-body);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  font-weight: var(--fw-regular);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  color: var(--text-heading);\n  font-weight: var(--fw-medium);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  margin: 0 0 var(--space-4);\n}\nh1 { font-size: var(--text-h1); }\nh2 { font-size: var(--text-h2); }\nh3 { font-size: var(--text-h3); }\nh4 { font-size: var(--text-h4); font-weight: var(--fw-semibold); }\n\np { margin: 0 0 var(--space-4); text-wrap: pretty; }\n\na { color: var(--text-link); text-decoration: none; transition: color var(--dur-fast) var(--ease-soft); }\na:hover { color: var(--rose-800); }\n\n/* Eyebrow / overline utility */\n.en-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--eyebrow-size);\n  font-weight: var(--fw-medium);\n  letter-spacing: var(--eyebrow-spacing);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n/* Editorial lead paragraph */\n.en-lead {\n  font-family: var(--font-display);\n  font-size: var(--text-lead);\n  line-height: var(--leading-relaxed);\n  color: var(--text-body);\n}\n\n::selection { background: var(--rose-200); color: var(--ink-900); }\n\n:focus-visible { outline: none; box-shadow: var(--shadow-focus); border-radius: var(--radius-sm); }\n\n/* PÉRIMÉNOPAUSE AUTREMENT — COMPONENT STYLES\n   Class-based styling for the React primitives. Shipped to consumers via\n   styles.css so components render correctly anywhere the stylesheet loads.\n   All visual values reference tokens. Prefix: .en-\n   Roles: wine = primary/interactive accent (buttons, focus, checked\n   states). rose = soft/secondary accent (badges, tags, avatars, subtle panels).\n   ------------------------------------------------------------------ */\n\n/* ============================== BUTTON ============================== */\n.en-btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);\n  font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--fw-medium);\n  letter-spacing: 0.06em; text-transform: uppercase;\n  padding: 0 var(--space-5); height: 46px;\n  background: var(--brand-primary); color: var(--text-on-primary);\n  border: var(--border-hairline) solid transparent;\n  border-radius: var(--radius-sm); cursor: pointer;\n  transition: background var(--dur-base) var(--ease-soft), color var(--dur-base) var(--ease-soft),\n              border-color var(--dur-base) var(--ease-soft), transform var(--dur-fast) var(--ease-soft);\n  text-decoration: none; white-space: nowrap; user-select: none;\n}\n.en-btn:hover { background: var(--brand-primary-hover); }\n.en-btn:active { transform: translateY(1px); }\n.en-btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); }\n\n.en-btn--secondary { background: var(--brand-secondary); color: var(--text-on-secondary); }\n.en-btn--secondary:hover { background: var(--brand-secondary-hover); }\n\n.en-btn--outline { background: transparent; color: var(--ink-800); border-color: var(--border-default); }\n.en-btn--outline:hover { background: var(--cream-100); border-color: var(--ink-700); }\n\n.en-btn--ghost { background: transparent; color: var(--ink-800); border-color: transparent; }\n.en-btn--ghost:hover { background: var(--cream-200); }\n\n.en-btn--link {\n  background: transparent; color: var(--text-link); border-color: transparent;\n  height: auto; padding: 0; text-transform: none; letter-spacing: 0; font-size: var(--text-sm);\n  border-bottom: 1px solid var(--sand-300); border-radius: 0;\n}\n.en-btn--link:hover { color: var(--rose-800); border-bottom-color: var(--rose-600); }\n.en-btn--link:active { transform: none; }\n\n.en-btn--sm { height: 38px; font-size: var(--text-xs); padding: 0 var(--space-4); }\n.en-btn--lg { height: 54px; font-size: var(--text-sm); padding: 0 var(--space-6); }\n.en-btn--block { display: flex; width: 100%; }\n\n.en-btn:disabled, .en-btn[aria-disabled=\"true\"] {\n  opacity: 0.45; cursor: not-allowed; pointer-events: none;\n}\n.en-btn__icon { display: inline-flex; width: 18px; height: 18px; }\n.en-btn__icon svg { width: 100%; height: 100%; }\n\n/* ============================ ICON BUTTON =========================== */\n.en-icon-btn {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 42px; height: 42px; border-radius: var(--radius-sm);\n  background: transparent; color: var(--ink-700);\n  border: var(--border-hairline) solid transparent; cursor: pointer;\n  transition: background var(--dur-base) var(--ease-soft), color var(--dur-base) var(--ease-soft);\n}\n.en-icon-btn:hover { background: var(--cream-200); color: var(--ink-900); }\n.en-icon-btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); }\n.en-icon-btn--outline { border-color: var(--border-default); }\n.en-icon-btn--sm { width: 34px; height: 34px; }\n.en-icon-btn svg { width: 20px; height: 20px; }\n\n/* ============================== BADGE =============================== */\n.en-badge {\n  display: inline-flex; align-items: center; gap: var(--space-1);\n  font-family: var(--font-sans); font-size: 11px; font-weight: var(--fw-medium);\n  letter-spacing: 0.1em; text-transform: uppercase;\n  padding: 3px var(--space-2); border-radius: var(--radius-xs);\n  background: var(--rose-100); color: var(--rose-800);\n}\n.en-badge--wine   { background: var(--wine-100); color: var(--wine-700); }\n.en-badge--neutral{ background: var(--cream-200); color: var(--ink-700); }\n.en-badge--success{ background: var(--green-success-soft); color: var(--green-success); }\n.en-badge--error  { background: var(--red-error-soft); color: var(--red-error); }\n.en-badge--solid  { background: var(--wine-500); color: var(--cream-50); }\n\n/* =============================== TAG =============================== */\n.en-tag {\n  display: inline-flex; align-items: center; gap: var(--space-2);\n  font-family: var(--font-sans); font-size: var(--text-sm); color: var(--ink-700);\n  padding: var(--space-1) var(--space-3); border-radius: var(--radius-pill);\n  border: var(--border-hairline) solid var(--border-subtle); background: var(--cream-50);\n  transition: border-color var(--dur-base) var(--ease-soft), background var(--dur-base) var(--ease-soft);\n}\n.en-tag[data-selected=\"true\"] { background: var(--rose-100); border-color: var(--rose-400); color: var(--rose-800); }\n.en-tag--button { cursor: pointer; }\n.en-tag--button:hover { border-color: var(--taupe-400); }\n.en-tag__close { display: inline-flex; cursor: pointer; opacity: .55; }\n.en-tag__close:hover { opacity: 1; }\n\n/* ============================== AVATAR ============================== */\n.en-avatar {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 44px; height: 44px; border-radius: var(--radius-pill); overflow: hidden;\n  background: var(--rose-200); color: var(--rose-800);\n  font-family: var(--font-display); font-size: 18px; font-weight: var(--fw-semibold);\n  flex: none;\n}\n.en-avatar img { width: 100%; height: 100%; object-fit: cover; }\n.en-avatar--sm { width: 32px; height: 32px; font-size: 14px; }\n.en-avatar--lg { width: 64px; height: 64px; font-size: 26px; }\n.en-avatar--square { border-radius: var(--radius-md); }\n\n/* =============================== CARD =============================== */\n.en-card {\n  background: var(--surface-card); border: var(--border-hairline) solid var(--border-subtle);\n  border-radius: var(--radius-lg); overflow: hidden;\n  transition: box-shadow var(--dur-base) var(--ease-soft), transform var(--dur-base) var(--ease-soft),\n              border-color var(--dur-base) var(--ease-soft);\n}\n.en-card--raised { box-shadow: var(--shadow-sm); border-color: transparent; }\n.en-card--interactive { cursor: pointer; }\n.en-card--interactive:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: transparent; }\n.en-card__media { width: 100%; aspect-ratio: 4 / 5; background: var(--cream-200); overflow: hidden; }\n.en-card__media img { width: 100%; height: 100%; object-fit: cover; }\n.en-card__body { padding: var(--space-5); }\n\n/* ============================= DIVIDER ============================= */\n.en-divider { border: none; border-top: var(--border-hairline) solid var(--divider); margin: var(--space-5) 0; }\n.en-divider--label {\n  display: flex; align-items: center; gap: var(--space-3); border: none; margin: var(--space-5) 0;\n  font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted);\n}\n.en-divider--label::before, .en-divider--label::after { content: \"\"; flex: 1; height: 1px; background: var(--divider); }\n\n/* ============================ FORM FIELD ============================ */\n.en-field { display: flex; flex-direction: column; gap: var(--space-2); font-family: var(--font-sans); }\n.en-label { font-size: var(--text-sm); font-weight: var(--fw-medium); color: var(--text-heading); letter-spacing: 0.01em; }\n.en-label__req { color: var(--wine-500); margin-left: 2px; }\n.en-help { font-size: var(--text-xs); color: var(--text-muted); }\n.en-help--error { color: var(--red-error); }\n\n.en-input, .en-textarea, .en-select__control {\n  font-family: var(--font-sans); font-size: var(--text-base); color: var(--ink-800);\n  background: var(--surface-card); border: var(--border-hairline) solid var(--border-default);\n  border-radius: var(--radius-sm); padding: 0 var(--space-4); height: 46px; width: 100%;\n  transition: border-color var(--dur-base) var(--ease-soft), box-shadow var(--dur-base) var(--ease-soft);\n}\n.en-input::placeholder, .en-textarea::placeholder { color: var(--taupe-400); }\n.en-input:hover, .en-textarea:hover, .en-select__control:hover { border-color: var(--ink-600); }\n.en-input:focus, .en-textarea:focus, .en-select__control:focus {\n  outline: none; border-color: var(--wine-500); box-shadow: var(--shadow-focus);\n}\n.en-textarea { height: auto; min-height: 110px; padding: var(--space-3) var(--space-4); line-height: var(--leading-normal); resize: vertical; }\n.en-input[aria-invalid=\"true\"], .en-textarea[aria-invalid=\"true\"] { border-color: var(--red-error); }\n.en-input:disabled, .en-textarea:disabled { background: var(--cream-200); color: var(--text-muted); cursor: not-allowed; }\n\n.en-select { position: relative; }\n.en-select__control { appearance: none; padding-right: var(--space-7); cursor: pointer; }\n.en-select__chevron { position: absolute; right: var(--space-4); top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--ink-600); }\n\n/* =========================== CHECKBOX ============================= */\n.en-check { display: inline-flex; align-items: flex-start; gap: var(--space-3); cursor: pointer; font-family: var(--font-sans); font-size: var(--text-base); color: var(--text-body); }\n.en-check input { position: absolute; opacity: 0; width: 0; height: 0; }\n.en-check__box {\n  flex: none; width: 20px; height: 20px; border-radius: var(--radius-xs);\n  border: var(--border-regular) solid var(--border-default); background: var(--surface-card);\n  display: inline-flex; align-items: center; justify-content: center; margin-top: 1px;\n  transition: background var(--dur-fast) var(--ease-soft), border-color var(--dur-fast) var(--ease-soft);\n  color: var(--cream-50);\n}\n.en-check__box svg { width: 13px; height: 13px; opacity: 0; transform: scale(.6); transition: opacity var(--dur-fast), transform var(--dur-fast); }\n.en-check input:checked + .en-check__box { background: var(--wine-500); border-color: var(--wine-500); }\n.en-check input:checked + .en-check__box svg { opacity: 1; transform: scale(1); }\n.en-check input:focus-visible + .en-check__box { box-shadow: var(--shadow-focus); }\n.en-check--radio .en-check__box { border-radius: var(--radius-pill); }\n.en-check--radio .en-check__dot { width: 10px; height: 10px; border-radius: 50%; background: var(--cream-50); opacity: 0; transform: scale(.4); transition: opacity var(--dur-fast), transform var(--dur-fast); }\n.en-check--radio input:checked + .en-check__box .en-check__dot { opacity: 1; transform: scale(1); }\n\n/* ============================= SWITCH ============================= */\n.e
